name: PHP Tests & Quality

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [8.4, 8.5]
        laravel: [11.*, 12.*, 13.*]
        exclude:
          - php: 8.5
            laravel: 11.*

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, pdo_mysql
        tools: composer:v2

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v6
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ matrix.php }}-laravel-${{ matrix.laravel }}-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-${{ matrix.php }}-laravel-${{ matrix.laravel }}-

    - name: Install dependencies
      run: |
        composer config audit.block-insecure false
        composer require "laravel/framework:${{ matrix.laravel }}" --no-interaction --no-update
        composer install --prefer-dist --no-progress --optimize-autoloader

    - name: Run PHPStan (Static Analysis)
      run: |
        if [ -f "vendor/bin/phpstan" ]; then
          ./vendor/bin/phpstan analyse --level=8 src/ tests/
        fi

    - name: Run PHP CS Fixer
      run: |
        if [ -f "vendor/bin/php-cs-fixer" ]; then
          ./vendor/bin/php-cs-fixer fix --dry-run --diff
        fi

    - name: Run test suite
      run: ./vendor/bin/phpunit --testdox

  lint:
    runs-on: ubuntu-latest
    name: Code Quality

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.5
        extensions: mbstring, xml, ctype, iconv, intl
        tools: composer:v2

    - name: Cache Composer packages
      uses: actions/cache@v6
      with:
        path: vendor
        key: ${{ runner.os }}-php-8.5-laravel-13.*-${{ hashFiles('**/composer.lock') }}

    - name: Install dependencies
      run: |
        composer config audit.block-insecure false
        composer require "laravel/framework:^13.0" --no-interaction --no-update
        composer install --prefer-dist --no-progress

    - name: Run Laravel Pint
      run: |
        if [ -f "vendor/bin/pint" ]; then
          ./vendor/bin/pint --test
        fi

    - name: Check for syntax errors
      run: |
        find src/ tests/ -name "*.php" -exec php -l {} \;

  security:
    runs-on: ubuntu-latest
    name: Security Check

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.5
        extensions: mbstring, xml, ctype, iconv, intl
        tools: composer:v2

    - name: Cache Composer packages
      uses: actions/cache@v6
      with:
        path: vendor
        key: ${{ runner.os }}-php-8.5-security-${{ hashFiles('**/composer.lock') }}

    - name: Install dependencies
      run: |
        composer config audit.block-insecure false
        composer require "laravel/framework:^13.0" --no-interaction --no-update
        composer install --prefer-dist --no-progress

    - name: Run Security Check
      run: |
        if [ -f "vendor/bin/security-checker" ]; then
          ./vendor/bin/security-checker security:check composer.lock
        fi

    - name: Run PHPCS Security
      run: |
        if [ -f "vendor/bin/phpcs" ]; then
          ./vendor/bin/phpcs --standard=Security src/ tests/
        fi
